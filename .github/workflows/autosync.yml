name: Auto Merge Upstream
on:
  workflow_call:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: write
defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync All Other Forks
    runs-on: ubuntu-latest
    steps:
      - name: Run GH Sync
        id: sync
        if: ${{ github.repository != 'socksthewolf/workflows' }}
        run: "gh api --method POST -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2026-03-10' /repos/$REPO/merge-upstream -f 'branch=$BRANCH'"
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
