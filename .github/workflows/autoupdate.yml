name: Auto Wrangler Updates
on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: wrangler
  cancel-in-progress: false
  queue: single

permissions:
  actions: write

jobs:
  clean_actions:
    uses: ./.github/workflows/clean_actions.yml

  get-repos:
    name: Get All Repos
    runs-on: ubuntu-latest
    environment: wrangler-update
    outputs:
      repos: ${{ steps.get-repos.outputs.repos }}
    steps:
      - name: Query Repositories
        id: get-repos
        uses: raven-actions/get-repos@main
        with:
          owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.READ_REPO_TOKEN }}
          topics: "wrangler,cloudflare"
          operator: "OR"

  sync-repos:
    name: Update Wrangler (${{ matrix.repo.name }})
    if: ${{ needs.get-repos.outputs.repos != '[]' }} # make sure repos exist
    runs-on: ubuntu-latest
    environment: wrangler-update
    needs:
      - get-repos
    strategy:
      matrix:
        repo: ${{ fromJson(needs.get-repos.outputs.repos) }}
      fail-fast: false
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.READ_REPO_TOKEN }}
          repository: ${{ matrix.repo.full_name }}

      - name: Find Node Directory
        id: node_directory
        # Welcome to the hack zone, I hate it here
        #
        # This is based on the necessity of wrangler.toml's presence
        # Probably not the best option, but w/e
        run: |
          dir=$(dirname $(realpath $(find . -name 'wrangler.toml')))
          dir=${dir/$WORKSPACE}
          dir=${dir#/}
          echo "dir=${dir}" >> "$GITHUB_OUTPUT"
          if [[ "$dir" != "" ]]; then
            echo "ver=${dir}/.node-version" >> "$GITHUB_OUTPUT"
            echo "lock=${dir}/package-lock.json" >> "$GITHUB_OUTPUT"
            echo "pack=${dir}/package.json" >> "$GITHUB_OUTPUT"
          else
            echo "ver=${dir}.node-version" >> "$GITHUB_OUTPUT"
            echo "lock=${dir}package-lock.json" >> "$GITHUB_OUTPUT"
            echo "pack=${dir}package.json" >> "$GITHUB_OUTPUT"
          fi
        env:
          WORKSPACE: ${{ github.workspace }}

        # Check to see if the package has a "types" run script
      - name: Read packages.json
        id: package_read
        uses: socksthewolf/github-action-json@v1.0.3
        with:
          path: ${{ steps.node_directory.outputs.pack }}

      - name: Check for types
        id: type_check
        if: ${{ steps.package_read.outputs.scripts }}
        run: |
          check_field=$(echo "$JSON_DATA" | jq -r .types)
          if [[ "$check_field" != null ]]; then
            echo "has_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_data=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          JSON_DATA: ${{ steps.package_read.outputs.scripts }}

        # TODO: Might want to consider also updating the .node-version
        # as a little helper, tbh

      - name: Install Node
        id: node
        uses: actions/setup-node@v7
        with:
          cache: "npm"
          cache-dependency-path: ${{ steps.node_directory.outputs.lock }}
          node-version-file: ${{ steps.node_directory.outputs.ver }}
          package-manager-cache: true

      - name: Install Wrangler Latest and Build Types
        run: |
          if [ -n "$NODE_DIR" ]; then
            echo "moved directory to $NODE_DIR"
            cd $NODE_DIR
          fi

          echo "Installing wrangler latest..."
          npm install wrangler@latest --save-dev

          if [[ "$NEEDS_TYPES" == "true" ]]; then
            echo "Building types..."
            npm install && npm run types
          fi
        env:
          NODE_DIR: ${{ steps.node_directory.outputs.dir }}
          NEEDS_TYPES: ${{ steps.type_check.outputs.has_data == 'true' }}

        # Set up the GPG Key for Signing Commits
      - name: Setup GPG Key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit Files
        if: ${{ success() && vars.AUTO_COMMIT == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          commit_message: "Updated Wrangler"
          commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
          # All Commits are Signed
          commit_options: '-S'

      - name: Create Pull Request
        if: ${{ success() && vars.AUTO_COMMIT == 'false' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.CREATE_PR_TOKEN }}
          delete-branch: true
          commit-message: "Update Wrangler"
          title: "Chore: Wrangler Update"
          assignees: ${{ github.actor }}
          committer: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          body: "As promised, the update to your wrangler dependencies"
          branch: "chore/wrangler-update"
