# Builds a sitemap using sscli, then commits it to the repository
name: Build and Commit Sitemap
on:
  workflow_call:
    outputs:
      had_changes:
        description: "If the sitemap did change and was committed"
        value: ${{ jobs.update.outputs.had_changes == 'true' }}
    secrets:
      GPG_PASSPHRASE:
      GPG_PRIVATE_KEY:
    inputs:
      path:
        type: string
        description: "The relative directory path to the sitemap from the root of the repo"
        required: true
      live_url:
        description: "Where the sitemap can be found online"
        type: string
        required: true
      clean_deploys:
        description: "If deployments should be cleaned up before building"
        type: boolean
        default: false
      force_clear_cache:
        description: "If the cache for the sitemap should be cleared regardless of if any changes were made"
        type: boolean
        default: false

permissions:
  contents: write
  deployments: write

jobs:
  clean_deploys:
    name: Cleanup Previous Deployments
    if: ${{ inputs.clean_deploys }}
    uses: ./.github/workflows/clean_deploys.yml
    with:
      environment: sitemap

  update:
    name: Build Sitemap
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    outputs:
      had_changes: ${{ steps.commit.outputs.changes_detected }}
    environment: sitemap
    steps:
        # Grab all files + History
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: "main"
          fetch-depth: 0
        # Fix modification timestamps
      - name: Fix Timestamps
        uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3
        with:
          args: --no-directories --skip-missing

        # Install node
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          cache: "npm"
          node-version-file: ".node-version"
          package-manager-cache: true
        # Build Node
      - name: Install and Build Sitemap
        if: success()
        run: npm install && npm run sitemap

        # Set up the GPG Key for Signing Commits
      - name: Setup GPG Key
        id: import-gpg
        if: success()
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

        # Commit Sitemap Changes (if Any)
      - name: Commit the Changes
        if: success()
        id: commit
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          file_pattern: ${{ inputs.path }}
          commit_message: "Updated Sitemap"
          commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
          commit_options: '-S'

  clear_sitemap_cache:
    name: Clear Sitemap Cache
    needs: update
    if: ${{ needs.update.outputs.had_changes == 'true' || inputs.force_clear_cache == 'true' }}
    uses: ./.github/workflows/clear_cache.yml
    with:
      paths: |
        ${{ inputs.live_url }}