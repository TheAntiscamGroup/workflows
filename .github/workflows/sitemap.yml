# Builds a sitemap using sscli, then commits it to the repository
name: Build and Commit Sitemap
on:
  workflow_call:
    inputs:
      path:
        type: string
        required: true
      live_url:
        type: string
        required: true
      clean_deploys:
        type: boolean
        default: false

permissions:
  contents: write
  deployments: write

jobs:
  clean_sitemap_deploys:
    runs-on: ubuntu-latest
    continue-on-error: true
    name: Clean Github Sitemap Deploys
    if: ${{ inputs.clean_deploys }}
    steps:
      - name: Cleanup Previous Deploys
        uses: strumwolf/delete-deployment-environment@035f6d27c8b8951729f4d71b2d3d6a7975139476
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: sitemap
          onlyRemoveDeployments: true
  update:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    outputs:
      needs_clear: ${{ steps.commit.outputs.changes_detected }}
    environment: sitemap
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: "main"
          fetch-depth: 0
      - name: Fix Timestamps
        uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3
        with:
          args: --no-directories --skip-missing
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          cache: "npm"
          node-version-file: ".node-version"
          package-manager-cache: true
      - name: Node Install Packages
        if: success()
        run: npm install
      - name: Rebuild Sitemap
        if: success()
        run: npm run sitemap
      - name: Setup GPG Key
        id: import-gpg
        if: success()
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Commit the Changes
        if: success()
        id: commit
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          file_pattern: ${{ inputs.path }}
          commit_message: "Updated Sitemap"
          commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
          commit_options: '-S'

  clear_sitemap_cache:
    name: Clear Sitemap Cache
    needs: update
    if: ${{ needs.update.outputs.needs_clear == 'true' }}
    uses: ./.github/workflows/cache.yml
    with:
      paths: |
        ${{ inputs.live_url }}