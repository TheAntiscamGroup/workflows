name: Tangled Mirror

on:
  workflow_call:
    secrets:
      KEY:

permissions:
  contents: read
  deployments: write

jobs:
  clean_deployments:
    name: Clean Previous Deploys
    uses: ./.github/workflows/clean_deploys.yml
    with:
      environment: tangled

  push_tangled:
    name: Update Tangled Mirror
    runs-on: ubuntu-latest
    environment: tangled
    steps:
      - name: Push to Tangled
        uses: gwennlbh/to-tangled@50f70a6910307e6fffa632e6d7cfec6b9e9f94ec
        with:
          repo: ${{ vars.MIRROR_REPO }}
          ssh-key: ${{ secrets.KEY }}